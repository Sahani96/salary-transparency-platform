spring.application.name=stats-service
server.port=8085
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/salarydb?currentSchema=salary}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=salary
spring.jpa.open-in-view=false
