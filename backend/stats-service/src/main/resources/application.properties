spring.application.name=search-service
server.port=${SERVER_PORT:8085}

# PostgreSQL Configuration (read-only access to salary schema)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql:/localhost:5432/postgres}
spring.datasource.username=${DATABASE_USERNAME:postgres.jtifherhrrfrsdtulinc}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=salary
spring.jpa.show-sql=false

# Pagination defaults
search.default.page-size=20
search.max.page-size=100

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.example.searchservice=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
