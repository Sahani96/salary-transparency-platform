apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: app
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: <your-db-password>
  JWT_SECRET: <your-jwt-secret-min-32-chars>
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: data
type: Opaque
stringData:
  POSTGRES_PASSWORD: <your-db-password>
