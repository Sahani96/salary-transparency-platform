apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
        - name: search-service
          image: <your-acr>.azurecr.io/search-service:latest
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-service.data.svc.cluster.local:5432/salarydb?currentSchema=salary
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: app
spec:
  selector:
    app: search-service
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP
